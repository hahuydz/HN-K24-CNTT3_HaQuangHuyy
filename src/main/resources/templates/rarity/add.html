<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add</title>
</head>
<body>

<form th:action="@{/rarity/save}" th:object="${rarity}" method="post">

    <div>
        <label>Name</label>
        <input type="text" th:field="*{name}">

        <p style="color:red"
           th:if="${#fields.hasErrors('name')}"
           th:errors="*{name}">
        </p>
    </div>

    <div>
        <label>Drop Rate</label>
        <input type="number" step="0.1" th:field="*{dropRate}">
    </div>

    <button type="submit">Save</button>
</form>

</body>
</html>
